{{- $configXmlValues := .Values.externalSecrets.configXml | default dict }}
{{- $postgresConfig := $configXmlValues.postgres | default dict }}
{{- $databaseMode := lower ($configXmlValues.database | default ($postgresConfig.method | default "sqlite")) }}
{{- if or .Values.postgresqlOperator.enabled (eq $databaseMode "operator") }}
# CloudNativePG PostgresCluster. Requires CloudNativePG operator installed.
# Set postgresql.enabled: false when using this. Bootstrap secret must exist (create via ExternalSecret).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.postgresqlOperator.clusterName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  instances: {{ .Values.postgresqlOperator.instances }}
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      {{- if .Values.postgresqlOperator.bootstrap.existingSecret }}
      secret:
        name: {{ .Values.postgresqlOperator.bootstrap.existingSecret }}
      {{- end }}
  storage:
    size: {{ .Values.postgresqlOperator.storageSize }}
    {{- if .Values.postgresqlOperator.storageClass }}
    storageClass: {{ .Values.postgresqlOperator.storageClass }}
    {{- end }}
{{- end }}
