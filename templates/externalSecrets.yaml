{{- if .Values.externalSecrets.enabled }}
{{- $configXmlValues := .Values.externalSecrets.configXml | default dict }}
{{- $databaseMode := lower ($configXmlValues.databaseMode | default "auto") }}
{{- $bitnamiPostgresqlEnabled := .Values.postgresql.enabled | default false }}
{{- $postgresqlOperatorEnabled := .Values.postgresqlOperator.enabled | default false }}
{{- $postgresHostOverride := $configXmlValues.postgresHost | default "" }}
{{- $managedPostgresqlConfigured := or $bitnamiPostgresqlEnabled $postgresqlOperatorEnabled }}
{{- $autoModeUsesPostgresql := or $managedPostgresqlConfigured (ne $postgresHostOverride "") }}
{{- $postgresqlBlockEnabled := false }}
{{- if eq $databaseMode "sqlite" }}
  {{- $postgresqlBlockEnabled = false }}
{{- else if or (eq $databaseMode "postgres") (eq $databaseMode "external-postgres") (eq $databaseMode "external") }}
  {{- $postgresqlBlockEnabled = true }}
{{- else }}
  {{- $postgresqlBlockEnabled = $autoModeUsesPostgresql }}
{{- end }}
# config.xml templated from 1Password (api_key + postgres). Secret "sonarr"; exposes api_key for Terraform.
# Requires: 1Password item (e.g. "sonarr") with api_key; postgres credentials from existing *-postgresql-credentials item.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.configXml.secretName | default "sonarr" }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.externalSecrets.configXml.secretName | default "sonarr" }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.xml: |
{{- $apiKey := print "{{" " .api_key " "}}" }}
{{- $t := include "sonarr_config_xml_content" . }}
{{- $t = $t | replace "__API_KEY__" $apiKey }}
{{- if $postgresqlBlockEnabled }}
{{- $pgPass := print "{{" " .postgres_password " "}}" }}
{{- $t = $t | replace "__POSTGRES_PASSWORD__" $pgPass }}
{{- end }}
{{ $t | nindent 10 }}
        api_key: {{ `{{ .api_key }}` | quote }}
  data:
    - secretKey: api_key
      remoteRef:
        key: {{ .Values.externalSecrets.configXml.apiKeyRef.key | quote }}
        property: {{ .Values.externalSecrets.configXml.apiKeyRef.property | default "api_key" | quote }}
{{- if $postgresqlBlockEnabled }}
    - secretKey: postgres_password
      remoteRef:
        key: {{ .Values.externalSecrets.configXml.postgresCredentialsRef.key | quote }}
        property: {{ .Values.externalSecrets.configXml.postgresCredentialsRef.property | default "password" | quote }}
{{- end }}
{{- end }}
