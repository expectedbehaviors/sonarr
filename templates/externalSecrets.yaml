{{- if .Values.externalSecrets.enabled }}
{{- $configXmlValues := .Values.externalSecrets.configXml | default dict }}
{{- $postgresConfig := $configXmlValues.postgres | default dict }}
{{- $databaseMode := lower ($configXmlValues.database | default ($postgresConfig.method | default "sqlite")) }}
{{- $postgresqlBlockEnabled := ne $databaseMode "sqlite" }}
# config.xml templated from 1Password (api_key + postgres). Secret "sonarr"; exposes api_key for Terraform.
# Requires: 1Password item (e.g. "sonarr") with api_key; postgres credentials from existing *-postgresql-credentials item.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.configXml.secretName | default "sonarr" }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.externalSecrets.configXml.secretName | default "sonarr" }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.xml: |
{{- $apiKey := print "{{" " .api_key " "}}" }}
{{- $configXmlTemplateContent := include "sonarrConfigXmlContent" . }}
{{- $configXmlTemplateContent = $configXmlTemplateContent | replace "__API_KEY__" $apiKey }}
{{- if $postgresqlBlockEnabled }}
{{- $postgresPasswordTemplate := print "{{" " .postgres_password " "}}" }}
{{- $configXmlTemplateContent = $configXmlTemplateContent | replace "__POSTGRES_PASSWORD__" $postgresPasswordTemplate }}
{{- end }}
{{ $configXmlTemplateContent | nindent 10 }}
        api_key: {{ `{{ .api_key }}` | quote }}
  data:
    - secretKey: api_key
      remoteRef:
        key: {{ .Values.externalSecrets.configXml.apiKeyRef.key | quote }}
        property: {{ .Values.externalSecrets.configXml.apiKeyRef.property | default "api_key" | quote }}
{{- if $postgresqlBlockEnabled }}
    - secretKey: postgres_password
      remoteRef:
        key: {{ $postgresConfig.credentialsRef.key | quote }}
        property: {{ $postgresConfig.credentialsRef.property | default "password" | quote }}
{{- end }}
{{- end }}
